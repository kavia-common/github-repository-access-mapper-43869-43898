# Test configuration for GitHub Access Report Backend
# Overrides production settings to avoid real API calls

spring.application.name=githubaccessreportbackend-test

# GitHub API Configuration - use dummy values for tests
github.token=test-token-dummy
github.org=test-org
github.api-base-url=https://api.github.com
github.page-size=10
github.max-concurrency=2

# Disable actuator endpoints during tests
management.endpoints.web.exposure.include=health

# Logging - reduce noise during tests
logging.level.com.example.githubaccessreportbackend=WARN
