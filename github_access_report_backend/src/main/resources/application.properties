spring.application.name=githubaccessreportbackend

# GitHub API Configuration
# GITHUB_TOKEN - Personal Access Token for GitHub API authentication (required)
# GITHUB_ORG   - Default GitHub organization or user name to scan (optional, can be overridden via query param)
#                Use the organization/user name only (e.g., "myorg"), NOT a full URL.
#                If a full GitHub URL is provided, the app will attempt to extract the org name automatically.
github.token=${GITHUB_TOKEN:}
github.org=${GITHUB_ORG:}
github.api-base-url=https://api.github.com
github.page-size=100
github.max-concurrency=10

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Respect X-Forwarded-* / Forwarded headers so redirects preserve external scheme/host/port
server.forward-headers-strategy=framework

# Logging
logging.level.com.example.githubaccessreportbackend=INFO
