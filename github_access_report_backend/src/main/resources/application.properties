# Server configuration
server.port=${PORT:3001}
server.address=${HOST:0.0.0.0}

# Application name
spring.application.name=github-access-report

# GitHub configuration - loaded from environment variables
github.token=${GITHUB_TOKEN:}
github.org=${GITHUB_ORG:}

# GitHub API base URL
github.api.base-url=https://api.github.com

# Concurrency settings for parallel API calls
github.api.max-concurrent-requests=10
github.api.page-size=100

# Request timeout in milliseconds
github.api.timeout-ms=${REQUEST_TIMEOUT_MS:30000}

# CORS configuration
cors.allowed-origins=${ALLOWED_ORIGINS:*}
cors.allowed-methods=${ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
cors.allowed-headers=${ALLOWED_HEADERS:Content-Type,Authorization,X-Requested-With}
cors.max-age=${CORS_MAX_AGE:3600}

# Actuator health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.kavia.githubaccess=INFO
logging.level.org.springframework.web=INFO
